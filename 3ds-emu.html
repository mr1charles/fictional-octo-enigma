<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web 3DS-Style Emulator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="th-blue">
  <div id="boot-overlay" class="boot-overlay">
    <div class="boot-logo">Nintendo 3DS</div>
    <div class="boot-sub">Web Emulator</div>
  </div>

  <main id="app" class="emu-shell">
    <section id="top-screen" class="screen top-screen">
      <header class="hud">
        <span id="clock">--:--</span>
        <span id="status">No game loaded</span>
      </header>
      <canvas id="top-canvas" width="400" height="240" aria-label="Top Screen"></canvas>
    </section>

    <section id="bottom-screen" class="screen bottom-screen">
      <canvas id="bottom-canvas" width="320" height="240" aria-label="Bottom Touch Screen"></canvas>
      <div id="touch-overlay" class="touch-overlay"></div>
      <div id="menu-panel" class="menu-panel">
        <div class="toolbar">
          <label class="btn file-btn">
            Load ROM
            <input id="rom-input" type="file" accept=".nes,.gba,.sfc,.smc,.zip,.3ds,.cci,.cxi" hidden />
          </label>
          <button id="quick-save" class="btn">Quick Save</button>
          <button id="quick-load" class="btn">Quick Load</button>
          <button id="resume-last" class="btn">Resume Last</button>
          <button id="open-settings" class="btn">Settings</button>
        </div>

        <section class="folders">
          <button class="folder-tab active" data-folder="installed">Installed</button>
          <button class="folder-tab" data-folder="favorites">Favorites</button>
          <button class="folder-tab" data-folder="recent">Recent</button>
        </section>

        <section id="library-grid" class="library-grid" aria-live="polite"></section>
      </div>
    </section>

    <section class="controls-strip">
      <div class="dpad" data-pad="dpad">
        <button data-input="up">▲</button><button data-input="left">◀</button>
        <button data-input="right">▶</button><button data-input="down">▼</button>
      </div>
      <div class="circle-pad" id="circle-pad">◉</div>
      <div class="abxy">
        <button data-input="x">X</button><button data-input="y">Y</button>
        <button data-input="a">A</button><button data-input="b">B</button>
      </div>
      <div class="shoulders">
        <button data-input="l">L</button>
        <button data-input="r">R</button>
      </div>
    </section>
  </main>

  <aside id="settings-modal" class="settings-modal hidden" role="dialog" aria-modal="true">
    <h2>Settings</h2>
    <label>Theme
      <select id="theme-select">
        <option value="th-blue">Blue</option>
        <option value="th-dark">Dark</option>
        <option value="th-pink">Pink</option>
        <option value="th-green">Green</option>
      </select>
    </label>
    <label>Scale
      <select id="scale-select">
        <option value="1">1x</option>
        <option value="2">2x</option>
        <option value="fullscreen">Fullscreen</option>
      </select>
    </label>
    <label>Shader
      <select id="shader-select">
        <option value="none">None</option>
        <option value="crt">CRT</option>
      </select>
    </label>
    <label>Scanline Intensity
      <input id="scanline-slider" type="range" min="0" max="1" step="0.05" />
    </label>
    <label>Pixel Smoothing
      <input id="smooth-toggle" type="checkbox" />
    </label>
    <label>Volume
      <input id="volume-slider" type="range" min="0" max="1" step="0.05" />
    </label>
    <label>Mute
      <input id="mute-toggle" type="checkbox" />
    </label>
    <button id="remap-controls" class="btn">Remap Controls</button>
    <button id="close-settings" class="btn">Close</button>
  </aside>

  <div id="drop-zone" class="drop-zone hidden">Drop ROM here</div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
